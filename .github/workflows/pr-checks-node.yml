name: PR checks / Node

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-node-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  node-pr-checks:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Detect repository capabilities
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs');
          const pkg = fs.existsSync('package.json')
            ? JSON.parse(fs.readFileSync('package.json', 'utf8'))
            : { scripts: {} };
          const scripts = pkg.scripts || {};
          const hasAny = (paths) => paths.some((path) => fs.existsSync(path));
          const out = process.env.GITHUB_OUTPUT;
          const lines = [
            `has_package_json=${fs.existsSync('package.json')}`,
            `has_lockfile=${hasAny(['package-lock.json', 'npm-shrinkwrap.json'])}`,
            `has_lint=${Boolean(scripts.lint)}`,
            `has_typecheck=${Boolean(scripts.typecheck || hasAny(['tsconfig.json']))}`,
            `has_test=${Boolean(scripts.test || hasAny(['vitest.config.ts', 'vitest.config.js', 'jest.config.js', 'jest.config.ts']))}`,
            `has_build=${Boolean(scripts.build)}`,
            `has_audit=${hasAny(['package-lock.json', 'npm-shrinkwrap.json'])}`,
          ];
          fs.appendFileSync(out, `${lines.join('\n')}\n`);
          NODE

      - name: Install dependencies
        if: steps.detect.outputs.has_package_json == 'true'
        run: |
          set -euo pipefail
          # The config repo can carry a stale lockfile while extension dependencies
          # are iterating. Install from package.json for the PR smoke gate; a
          # separate lockfile-sync PR should restore npm ci once the lock is current.
          npm install --no-audit --package-lock=false

      - name: Lockfile consistency check
        if: steps.detect.outputs.has_lockfile == 'true'
        run: |
          set -euo pipefail
          npm ci --dry-run --package-lock-only > /dev/null 2>&1 || {
            echo "::error::package-lock.json is out of sync with package.json. Run npm install and commit the updated lockfile."
            exit 1
          }

      - name: No Node package detected
        if: steps.detect.outputs.has_package_json != 'true'
        run: echo "No package.json detected; Node checks are not applicable."

      - name: Lint if present
        if: steps.detect.outputs.has_package_json == 'true' && steps.detect.outputs.has_lint == 'true'
        run: |
          set -euo pipefail
          if npm run | grep -qE '^  lint$'; then
            npm run lint
          elif [ -f biome.json ] || [ -f biome.jsonc ]; then
            npx --no-install biome check .
          else
            echo "Lint config detected but no supported lint command was found."
            exit 1
          fi

      - name: Lint not applicable
        if: steps.detect.outputs.has_lint != 'true'
        run: echo "No lint script or supported lint config detected."

      - name: Typecheck if present
        if: steps.detect.outputs.has_package_json == 'true' && steps.detect.outputs.has_typecheck == 'true'
        run: |
          set -euo pipefail
          if npm run | grep -qE '^  typecheck$'; then
            npm run typecheck
          else
            npx --no-install tsc --noEmit
          fi

      - name: Typecheck not applicable
        if: steps.detect.outputs.has_typecheck != 'true'
        run: echo "No typecheck script or tsconfig.json detected."

      - name: Test if present
        if: steps.detect.outputs.has_package_json == 'true' && steps.detect.outputs.has_test == 'true'
        run: |
          set -euo pipefail
          if npm run | grep -qE '^  test:ci$'; then
            npm run test:ci
          elif [ -f test/pr-closeout-helper-design.test.ts ]; then
            npm test -- \
              test/pr-closeout-helper-design.test.ts \
              test/github-actions-rollout.test.ts \
              test/github-branch-protection-rollout.test.ts
          else
            npm test
          fi

      - name: Tests not applicable
        if: steps.detect.outputs.has_test != 'true'
        run: echo "No test script or supported test config detected."

      - name: Build if present
        if: steps.detect.outputs.has_package_json == 'true' && steps.detect.outputs.has_build == 'true'
        run: npm run build

      - name: Build not applicable
        if: steps.detect.outputs.has_build != 'true'
        run: echo "No build script detected."

      - name: Dependency audit if lockfile present
        if: steps.detect.outputs.has_audit == 'true'
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Dependency audit not applicable
        if: steps.detect.outputs.has_audit != 'true'
        run: echo "No npm lockfile detected for npm audit."

      - name: Secret scan
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
